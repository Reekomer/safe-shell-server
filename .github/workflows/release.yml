name: Build llama.cpp Server (Tauri Sidecars)

on:
  workflow_dispatch: # Allows you to trigger the build manually
  release:
    types: [created]

jobs:
  build-macos:
    name: Build macOS (Metal)
    runs-on: macos-14 # 'macos-14' specifically provisions an Apple Silicon (M-series) runner
    steps:
      - name: Install Build Tools
        run: brew update && brew install cmake git curl

      - name: Clone llama.cpp
        run: git clone https://github.com/ggml-org/llama.cpp.git
        
      - name: Configure CMake
        working-directory: llama.cpp
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_METAL=ON \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_BORINGSSL=ON \
            -DCMAKE_IGNORE_PATH="/opt/homebrew"

      - name: Compile Server
        working-directory: llama.cpp
        run: cmake --build build --config Release -j $(sysctl -n hw.logicalcpu) --target llama-server

      - name: Verify Binary Portability
        working-directory: llama.cpp
        run: |
          echo "=== Verifying Shared Dependencies ==="
          otool -L build/bin/llama-server
          
          # If we see Homebrew or rpath links, the build fails before you accidentally release it.
          if otool -L build/bin/llama-server | grep -E "(/opt/homebrew|@rpath/libllama|@rpath/libggml)"; then
            echo "ERROR: Binary contains non-portable local or shared paths!"
            exit 1
          fi
          echo "Success: Binary is fully portable and linked to native macOS system libraries."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-macos-aarch64
          path: llama.cpp/build/bin/llama-server

  build-windows:
    name: Build Windows (CUDA)
    runs-on: windows-2022
    steps:
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.4.1'

      # Sets up the MSVC environment variables so Ninja can find the C++ compiler
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # Installs Ninja via Chocolatey (native to windows-latest)
      - name: Install Ninja
        run: choco install ninja -y

      - name: Clone llama.cpp
        run: git clone https://github.com/ggml-org/llama.cpp.git

      - name: Configure CMake
        working-directory: llama.cpp
        # Added -G Ninja to change the build system
        run: cmake -B build -G Ninja -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES="80;86;89;90" -DBUILD_SHARED_LIBS=OFF
        
      - name: Compile Server
        working-directory: llama.cpp
        # Ninja automatically utilizes all available processors, so -j is no longer strictly necessary
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-windows-x86_64.exe
          path: llama.cpp/build/bin/llama-server.exe

  build-windows-vulkan:
    name: Build Windows (Vulkan)
    runs-on: windows-2022

    steps:
      # Install Vulkan SDK
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.304.1
          cache: true

      # Diagnostic step
      - name: Inspect Vulkan SDK
        shell: pwsh
        run: |
          Write-Host "=== Vulkan SDK ==="
          Write-Host "VULKAN_SDK=$env:VULKAN_SDK"

          if (Test-Path $env:VULKAN_SDK) {
            Write-Host "`n=== SPIRV-related files ==="
            Get-ChildItem "$env:VULKAN_SDK" -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match "SPIRV" } |
              Select-Object FullName
          }

          Write-Host "`n=== Searching for SPIRV-HeadersConfig.cmake ==="
          Get-ChildItem "$env:VULKAN_SDK" -Recurse -Filter "SPIRV-HeadersConfig.cmake" -ErrorAction SilentlyContinue

      # MSVC compiler environment
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # Ninja
      - name: Install Ninja
        run: choco install ninja -y

      # vcpkg
      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      # SPIRV-Headers package required by recent llama.cpp Vulkan builds
      - name: Install SPIRV-Headers
        shell: pwsh
        run: |
          .\vcpkg\vcpkg install spirv-headers:x64-windows

      # Clone llama.cpp
      - name: Clone llama.cpp
        run: git clone https://github.com/ggml-org/llama.cpp.git

      # Optional: print revision for debugging
      - name: Show llama.cpp revision
        working-directory: llama.cpp
        run: git rev-parse HEAD

      # Configure
      - name: Configure CMake
        working-directory: llama.cpp
        shell: pwsh
        run: |
          $toolchain = "${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          $toolchain = $toolchain -replace '\\','/'

          cmake -B build `
            -G Ninja `
            -DGGML_VULKAN=ON `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_TOOLCHAIN_FILE=$toolchain"

      # Build
      - name: Compile Server
        working-directory: llama.cpp
        run: cmake --build build --config Release --target llama-server

      # Upload
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-windows-vulkan-x86_64.exe
          path: llama.cpp/build/bin/llama-server.exe

  build-linux:
    name: Build Linux (CUDA)
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake git curl libcurl4-openssl-dev libssl-dev

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.4.1'

      - name: Clone llama.cpp
        run: git clone https://github.com/ggml-org/llama.cpp.git

      - name: Configure CMake
        working-directory: llama.cpp
        run: cmake -B build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES="80;86;89;90" -DBUILD_SHARED_LIBS=OFF -DLLAMA_CURL=ON
        
      - name: Compile Server
        working-directory: llama.cpp
        run: cmake --build build --config Release -j $(nproc) --target llama-server

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-linux-x86_64
          path: llama.cpp/build/bin/llama-server

  build-macos-intel:
    name: Build macOS (Intel)
    runs-on: macos-15-intel
    steps:
      - name: Install Build Tools
        run: brew update && brew install cmake git curl

      - name: Clone llama.cpp
        run: git clone https://github.com/ggml-org/llama.cpp.git
        
      - name: Configure CMake
        working-directory: llama.cpp
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_METAL=ON \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_BORINGSSL=ON \
            -DCMAKE_IGNORE_PATH="/usr/local" # Homebrew lives in /usr/local on Intel Macs

      - name: Compile Server
        working-directory: llama.cpp
        run: cmake --build build --config Release -j $(sysctl -n hw.logicalcpu) --target llama-server

      - name: Verify Binary Portability
        working-directory: llama.cpp
        run: |
          echo "=== Verifying Shared Dependencies ==="
          otool -L build/bin/llama-server
          
          # Checking /usr/local instead of /opt/homebrew for Intel environments
          if otool -L build/bin/llama-server | grep -E "(/usr/local|@rpath/libllama|@rpath/libggml)"; then
            echo "ERROR: Binary contains non-portable local or shared paths!"
            exit 1
          fi
          echo "Success: Binary is fully portable and linked to native macOS system libraries."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-macos-x86_64
          path: llama.cpp/build/bin/llama-server